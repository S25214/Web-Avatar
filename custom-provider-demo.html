<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Provider Demo — ChatWidget</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #e2e8f0; --border: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }
        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; color: #fff; }
        .subtitle { font-size: 0.875rem; color: #94a3b8; margin-bottom: 24px; }

        .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1100px; }
        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }

        .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; color: var(--accent); }

        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        button {
            background: var(--accent); color: #0f172a; border: none; padding: 8px 16px;
            border-radius: 8px; cursor: pointer; font-size: 0.813rem; font-weight: 600;
            transition: transform 0.15s, opacity 0.15s;
        }
        button:hover { opacity: 0.85; transform: translateY(-1px); }
        button:active { transform: scale(0.97); }
        button.secondary { background: #475569; color: #e2e8f0; }
        button.danger { background: #ef4444; color: #fff; }

        input[type="text"], textarea {
            width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 0.875rem; font-family: inherit;
            margin-bottom: 10px; resize: vertical;
        }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: var(--accent); }

        label { font-size: 0.75rem; font-weight: 600; color: #94a3b8; margin-bottom: 4px; display: block; }

        #console-log {
            background: #0c0c0c; border: 1px solid var(--border); border-radius: 8px;
            padding: 12px; font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 0.75rem;
            max-height: 300px; overflow-y: auto; white-space: pre-wrap; line-height: 1.6;
            color: #a5f3fc;
        }
        .log-user { color: #34d399; }
        .log-mic { color: #fbbf24; }
        .log-info { color: #94a3b8; }
        .log-error { color: #f87171; }

        .status-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.7rem;
            font-weight: 600; background: #166534; color: #86efac; margin-left: 8px;
        }
    </style>
</head>
<body>

    <h1>🔌 Custom Provider Demo <span class="status-badge" id="provider-badge">Custom Mode</span></h1>
    <p class="subtitle">Test all <code>window.ChatWidget</code> API methods — no Botnoi backend loaded.</p>

    <div class="layout">
        <!-- Messages Card -->
        <div class="card">
            <h2>💬 Messages</h2>
            <label>Bot message text</label>
            <input type="text" id="bot-msg-input" value="Hello! I'm your custom bot 🤖" />
            <div class="btn-group">
                <button onclick="testAddBotMessage()">addBotMessage()</button>
                <button onclick="testAddBotMessageWithAnim()" class="secondary">+ Animation</button>
            </div>

            <label>User message text</label>
            <input type="text" id="user-msg-input" value="Tell me a joke" />
            <div class="btn-group">
                <button onclick="testAddUserMessage()">addUserMessage()</button>
            </div>
        </div>

        <!-- Audio Card -->
        <div class="card">
            <h2>🔊 Audio / TTS</h2>
            <label>Audio URL (leave blank for test tone)</label>
            <input type="text" id="audio-url-input" placeholder="https://example.com/audio.mp3" />
            <div class="btn-group">
                <button onclick="testPlayAudio()">playAudio()</button>
                <button onclick="testStopAudio()" class="danger">stopAudio()</button>
            </div>

            <label>Streaming audio chunks</label>
            <div class="btn-group">
                <button onclick="testPushAudioChunk()" class="secondary">pushAudioChunk() (test tone)</button>
                <button onclick="toggleMicStreaming()" id="mic-stream-btn" class="secondary">Start Mic Streaming</button>
                <button onclick="testEndAudio()" class="secondary">endAudio()</button>
            </div>
        </div>

        <!-- Animation Card -->
        <div class="card">
            <h2>🎭 Animation</h2>
            <label>Animation name</label>
            <input type="text" id="anim-input" value="Idleloop" />
            <div class="btn-group">
                <button onclick="testPlayAnimation()">playAnimation()</button>
            </div>
        </div>

        <!-- Mic Card -->
        <div class="card">
            <h2>🎤 Microphone</h2>
            <p style="font-size:0.813rem;color:#94a3b8;margin-bottom:12px;">
                Register callbacks, then click the mic button in the widget to test.
            </p>
            <div class="btn-group">
                <button onclick="registerMicCallbacks()">Register Mic Callbacks</button>
                <button onclick="simulateASR()" class="secondary">Simulate ASR Flow</button>
            </div>
        </div>

        <!-- Config Card -->
        <div class="card">
            <h2>⚙️ Configuration</h2>
            <div class="btn-group">
                <button onclick="testSetVolume(0.5)" class="secondary">setVolume(0.5)</button>
                <button onclick="testSetVolume(1.0)" class="secondary">setVolume(1.0)</button>
                <button onclick="testSetVolume(0)" class="secondary">setVolume(0)</button>
                <button onclick="testClearHistory()" class="danger">clearHistory()</button>
            </div>
            <div class="btn-group">
                <button onclick="testSetStatus('online', 'Connected')" class="secondary">Status: Online</button>
                <button onclick="testSetStatus('offline', 'Disconnected')" class="secondary">Status: Offline</button>
            </div>
        </div>

        <!-- Console Card -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>📋 Event Console <button onclick="clearConsole()" class="secondary" style="float:right;padding:4px 12px;">Clear</button></h2>
            <div id="console-log"><span class="log-info">// Waiting for events…</span></div>
        </div>
    </div>

    <!-- Load the chat widget in CUSTOM mode -->
    <script
        src="https://webavatar.didthat.cc/chat-widget.js"
        data-provider="custom"
        data-widget-id="demo-widget-001"
        data-title="Custom Bot"
        data-avatar-url="Botnoi"
    ></script>

    <script>
        const consoleEl = document.getElementById('console-log');

        function log(cls, prefix, msg) {
            const line = document.createElement('div');
            line.className = cls;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${prefix} ${msg}`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // Register onUserMessage callback
        if (window.ChatWidget) {
            ChatWidget.onUserMessage(function(text) {
                log('log-user', '📤 onUserMessage:', text);
            });
            log('log-info', '✅', 'ChatWidget API detected. onUserMessage registered.');
        } else {
            log('log-error', '❌', 'ChatWidget not found on window!');
        }

        // --- Test Functions ---

        function testAddBotMessage() {
            const text = document.getElementById('bot-msg-input').value || 'Hello from custom bot!';
            ChatWidget.addBotMessage(text);
            log('log-info', '🤖 addBotMessage:', text);
        }

        function testAddBotMessageWithAnim() {
            const text = document.getElementById('bot-msg-input').value || 'Hello!';
            ChatWidget.addBotMessage(text, { animation: document.getElementById('anim-input').value || 'Greeting' });
            log('log-info', '🤖 addBotMessage + animation:', text);
        }

        function testAddUserMessage() {
            const text = document.getElementById('user-msg-input').value || 'Test message';
            ChatWidget.addUserMessage(text);
            log('log-info', '👤 addUserMessage:', text);
        }

        function testPlayAudio() {
            const url = document.getElementById('audio-url-input').value;
            if (url) {
                ChatWidget.playAudio(url);
                log('log-info', '🔊 playAudio:', url);
            } else {
                log('log-info', '🔊 playAudio: No URL provided (enter a URL to test)');
            }
        }

        function testStopAudio() {
            ChatWidget.stopAudio();
            log('log-info', '🔇 stopAudio()');
        }

        function testPushAudioChunk() {
            log('log-info', '📦 pushAudioChunk: Creating test tone…');
            // Generate a short test tone as ArrayBuffer
            const sampleRate = 22050;
            const duration = 0.5;
            const numSamples = sampleRate * duration;
            const buffer = new ArrayBuffer(44 + numSamples * 2);
            const view = new DataView(buffer);

            // WAV header
            const writeString = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + numSamples * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, numSamples * 2, true);

            for (let i = 0; i < numSamples; i++) {
                const t = i / sampleRate;
                const val = Math.sin(2 * Math.PI * 440 * t) * 0.3;
                view.setInt16(44 + i * 2, val * 32767, true);
            }

            ChatWidget.pushAudioChunk(buffer);
            log('log-info', '📦 Pushed 440Hz test tone (0.5s)');
        }

        function testEndAudio() {
            ChatWidget.endAudio();
            log('log-info', '🔚 endAudio()');
        }

        // --- Mic Streaming State ---
        let micAudioContext = null;
        let micStreamSource = null;
        let micProcessor = null;
        let localStream = null;
        let isMicStreaming = false;

        async function toggleMicStreaming() {
            const btn = document.getElementById('mic-stream-btn');

            if (isMicStreaming) {
                // Stop streaming and clean up audio nodes
                if (micProcessor) {
                    micProcessor.disconnect();
                    micProcessor.onaudioprocess = null;
                }
                if (micStreamSource) micStreamSource.disconnect();
                if (micAudioContext) micAudioContext.close();
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                
                isMicStreaming = false;
                btn.textContent = "Start Mic Streaming";
                btn.classList.remove('danger');
                btn.classList.add('secondary');
                
                ChatWidget.endAudio();
                log('log-info', '🎙️ Mic Streaming:', 'Stopped & called endAudio()');
            } else {
                // Start streaming
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    // Let the browser use its native hardware sample rate
                    micAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                    micStreamSource = micAudioContext.createMediaStreamSource(localStream);
                    
                    // Create a processor to extract raw PCM data chunks (4096 frames per chunk)
                    micProcessor = micAudioContext.createScriptProcessor(4096, 1, 1);
                    
                    let chunkCount = 0;
                    micProcessor.onaudioprocess = (e) => {
                        const inputData = e.inputBuffer.getChannelData(0); 
                        
                        // Clone the Float32Array to a new ArrayBuffer
                        const pcmBuffer = new Float32Array(inputData).buffer;
                        
                        // Push raw PCM to the widget IMMEDIATELY (No array buffering here)
                        ChatWidget.pushAudioChunk(pcmBuffer, {
                            pcm: true,
                            sampleRate: micAudioContext.sampleRate, 
                            channels: 1,
                            bitDepth: 32
                        });
                        
                        chunkCount++;
                        if (chunkCount % 10 === 0) {
                             log('log-mic', '🎙️ Pushed PCM chunk:', (pcmBuffer.byteLength / 1024).toFixed(1) + 'KB @ ' + micAudioContext.sampleRate + 'Hz');
                        }
                    };

                    // Routing: Mic -> Processor -> Muted Gain Node -> Destination
                    const dummyGain = micAudioContext.createGain();
                    dummyGain.gain.value = 0; 
                    
                    micStreamSource.connect(micProcessor);
                    micProcessor.connect(dummyGain);
                    dummyGain.connect(micAudioContext.destination);

                    isMicStreaming = true;
                    btn.textContent = "Stop Mic Streaming";
                    btn.classList.remove('secondary');
                    btn.classList.add('danger');
                    log('log-info', '🎙️ Mic Streaming:', 'Started pushing raw PCM chunks');

                } catch (err) {
                    log('log-error', '🎙️ Mic Error:', err.message);
                }
            }
        }

        function testPlayAnimation() {
            const name = document.getElementById('anim-input').value || 'Idleloop';
            ChatWidget.playAnimation(name);
            log('log-info', '🎭 playAnimation:', name);
        }

        function registerMicCallbacks() {
            ChatWidget.onMicToggle(function(isRecording, data) {
                if (isRecording) {
                    log('log-mic', '🎤 onMicToggle:', 'Recording started');
                } else if (data && data.error) {
                    log('log-error', '🎤 onMicToggle:', 'Error: ' + data.error);
                } else {
                    const size = data && data.blob ? (data.blob.size / 1024).toFixed(1) + 'KB' : 'no blob';
                    log('log-mic', '🎤 onMicToggle:', 'Recording stopped (' + size + ')');
                }
            });

            ChatWidget.onMicChunk(function(chunk) {
                log('log-mic', '🎤 onMicChunk:', (chunk.size / 1024).toFixed(1) + 'KB chunk received');
            });

            log('log-info', '✅', 'Mic callbacks registered. Click the mic button in the widget!');
        }

        function simulateASR() {
            log('log-info', '🤖 Simulating ASR flow…');
            // Simulate: user speaks → ASR returns text → add as user message → bot responds
            setTimeout(function() {
                const transcript = 'สวัสดีครับ ผมต้องการความช่วยเหลือ';
                ChatWidget.addUserMessage(transcript);
                log('log-info', '🗣️ ASR transcript:', transcript);

                setTimeout(function() {
                    ChatWidget.addBotMessage('สวัสดีค่ะ! ยินดีให้บริการค่ะ มีอะไรให้ช่วยเหลือคะ? 😊');
                    log('log-info', '🤖 Bot response sent');
                }, 1000);
            }, 500);
        }

        function testSetVolume(val) {
            ChatWidget.setVolume(val);
            log('log-info', '🔉 setVolume:', val);
        }

        function testClearHistory() {
            ChatWidget.clearHistory();
            log('log-info', '🗑️ clearHistory()');
        }

        function testSetStatus(s, label) {
            ChatWidget.setStatus(s, label);
            log('log-info', '📡 setStatus:', s + ' / ' + label);
        }

        function clearConsole() {
            consoleEl.innerHTML = '<span class="log-info">// Console cleared</span>';
        }
    </script>
</body>
</html>
