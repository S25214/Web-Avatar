<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Widget Custom Site Loader</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* Prevent scrollbars on the body */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #toolbar {
            background: #2b2b2b;
            color: #e0e0e0;
            padding: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #111;
            z-index: 1000;
            /* Ensure toolbar is above everything */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: margin-top 0.3s ease-in-out;
        }



        #toolbar-notch {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 20px;
            background: #2b2b2b;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
            border: 1px solid #111;
            border-top: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 1001;
            font-size: 10px;
            color: #aaa;
            user-select: none;
        }

        #toolbar-notch:hover {
            background-color: #3b3b3b;
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #url-group {
            flex-grow: 1;
        }

        #urlInput, #audioInput {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
            min-width: 50px;
            background: #333;
            color: #e0e0e0;
        }

        .custom-select {
            position: relative;
            width: 150px;
            font-size: 14px;
        }

        .custom-select-button {
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            background: #333;
            color: #e0e0e0;
            cursor: pointer;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .custom-select-button::after {
            content: '▼';
            font-size: 10px;
            margin-left: 8px;
        }

        .custom-select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #333;
            color: #e0e0e0;
            border: 1px solid #444;
            border-top: none;
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.5);
            max-height: 250px;
            overflow-y: auto;
            z-index: 2000;
            display: none;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .custom-select-options.open {
            display: block;
        }

        .custom-select-options li {
            padding: 8px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .custom-select-options li:hover {
            background: #444;
            color: #fff;
        }

        .custom-select-options li.selected {
            background: #555;
            font-weight: bold;
            color: #fff;
        }

        .custom-select-options li.selected:hover {
            background: #666;
            color: #fff;
        }

        #toolbar button {
            background-color: #444;
            color: #e0e0e0;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
        }

        #toolbar button:hover {
            background-color: #555;
        }

        #loadBtn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 600px) {
            #toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-group {
                width: 100%;
            }

            /* #select-group inherits .toolbar-group styles (width: 100%) */

            .custom-select {
                flex: 1;
                /* Grow to fill space */
                width: 0;
                /* Allow shrinking below content size if needed */
                min-width: 0;
                /* Allow flex shrinking */
            }
        }

        #siteFrame {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
            background-color: #464646;
            display: none;
        }

        #emptyState {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start !important;
            justify-content: top !important;
            background-color: #1e1e1e;
            color: #666;
            text-align: center;
            padding: 20px;
        }

        #emptyState p {
            margin: 0;
            font-size: 14px;
            
        }
    </style>
    <!-- Widget Loader Script (No type="module" so it runs immediately to inject importmap) -->
    <!-- Simple Script Include -->
    <script src="./avatar-widget.js"></script>
    <!-- <script src="https://webavatar.didthat.cc/avatar-widget.js"></script> -->
</head>

<body>
    <div id="toolbar">
        <div class="toolbar-group" id="url-group">
            <input type="url" id="urlInput" placeholder="Enter website URL (e.g., https://example.com)"
                value="https://voice.botnoi.ai/" />
            <button id="loadBtn">Load</button>
        </div>
        <div class="toolbar-group" id="select-group">
            <div class="custom-select" id="modelSelectContainer">
                <div class="custom-select-button" id="modelSelectBtn">Loading...</div>
                <ul class="custom-select-options" id="modelSelectOpts"></ul>
            </div>
            <div class="custom-select" id="animSelectContainer">
                <div class="custom-select-button" id="animSelectBtn">Loading...</div>
                <ul class="custom-select-options" id="animSelectOpts"></ul>
            </div>
        </div>
        <div class="toolbar-group" id="audio-group">
            <input type="text" id="audioInput" placeholder="Audio URL or Base64" style="width: 150px;">
            <button id="playAudioBtn">Play</button>
            <button id="stopAudioBtn">Stop</button>
            <label for="volumeSlider">Vol:</label>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="1" style="width: 60px;">
        </div>
        <div class="toolbar-group" id="emotion-group">
            <select id="emotionSelect" style="padding: 2px;">
                <option value="idle">Idle</option>
                <option value="angry">Angry</option>
                <option value="happy">Happy</option>
                <option value="sad">Sad</option>
                <option value="surprised">Surprised</option>
                <option value="disgust">Disgust</option>
            </select>
            <input type="number" id="emotionDuration" placeholder="Secs" value="0" step="0.1" style="width: 50px;">
            <button id="playEmotionBtn">Play</button>
        </div>
        <div style="font-size: 12px; margin-bottom: 5px; display: flex; gap: 8px; align-items: center; justify-content: center;">
            <span>Cam:</span>
            <button id="camUpBtn" style="padding: 2px 8px;">↑</button>
            <button id="camDownBtn" style="padding: 2px 8px;">↓</button>
            <button id="camLeftBtn" style="padding: 2px 8px;">←</button>
            <button id="camRightBtn" style="padding: 2px 8px;">→</button>
            <button id="camZUpBtn" style="padding: 2px 8px; margin-left: 5px;">Z ↑</button>
            <button id="camZDownBtn" style="padding: 2px 8px;">Z ↓</button>
        </div>
        <div id="toolbar-notch" title="Toggle Toolbar">▲</div>
    </div>

    <div id="emptyState">
        <p>Drag and drop a .vrm or .vrma file here, or enter a URL above to load a website.</p>
    </div>

    <iframe id="siteFrame" src="about:blank"></iframe>

    <!-- Drop Overlay -->
    <div id="dropOverlay" style="
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 123, 255, 0.15);
        border: 4px dashed #007bff;
        z-index: 9999;
        justify-content: center;
        align-items: top;
        padding-top: 100px;
        font-size: 24px;
        font-weight: bold;
        color: #007bff;
        z-index: 10000;
    ">Drop VRM or VRMA file here</div>

    <script>
        const initWidget = async () => {
            let cameraTarget = { x: 0, y: 0, z: -3 };

            // Initialize Widget using the new global API
            window.WebAvatar.init({
                position: 'center',
                offset: { x: 0, y: 100 },
                cameraTarget: cameraTarget,
                randomGeneric: false,
                defaultAnimationUrl: 'Idleloop',
                sss: false,
                onAnimationLoaded: (url) => {
                    const animSelectContainer = document.getElementById('animSelectContainer');
                    if (animSelectContainer && animSelectContainer.selectByUrlMatch) {
                        animSelectContainer.selectByUrlMatch(url);
                    }
                }
            });

            // Close dropdowns when clicking outside
            document.addEventListener('click', () => {
                document.querySelectorAll('.custom-select-options').forEach(el => el.classList.remove('open'));
            });

            const setupCustomSelect = (containerId, btnId, optsId, assets, defaultName, onChange) => {
                const container = document.getElementById(containerId);
                const btn = document.getElementById(btnId);
                const optsList = document.getElementById(optsId);
                optsList.innerHTML = '';
                
                let selectedValue = null;
                const optionsElements = [];

                btn.onclick = (e) => {
                    e.stopPropagation();
                    const isOpen = optsList.classList.contains('open');
                    document.querySelectorAll('.custom-select-options').forEach(el => el.classList.remove('open'));
                    if (!isOpen) optsList.classList.add('open');
                };

                const selectOption = (val, text, trigger = true) => {
                    selectedValue = val;
                    btn.textContent = text;
                    optionsElements.forEach(li => {
                        if (li.dataset.value === val) li.classList.add('selected');
                        else li.classList.remove('selected');
                    });
                    if (trigger && onChange) onChange(val);
                };

                assets.forEach(fileName => {
                    const li = document.createElement('li');
                    li.dataset.value = fileName;
                    const textContent = fileName.replace(/\.[^/.]+$/, "");
                    li.textContent = textContent;
                    li.onclick = (e) => {
                        e.stopPropagation();
                        selectOption(fileName, textContent);
                        optsList.classList.remove('open');
                    };
                    optsList.appendChild(li);
                    optionsElements.push(li);

                    if (fileName.toLowerCase().includes(defaultName.toLowerCase())) {
                        selectedValue = fileName;
                        btn.textContent = textContent;
                        li.classList.add('selected');
                    }
                });

                if (!selectedValue && assets.length > 0) {
                    selectOption(assets[0], assets[0].replace(/\.[^/.]+$/, ""), false);
                }

                container.selectByUrlMatch = (url) => {
                    const filename = url.split('/').pop().toLowerCase();
                    for (const li of optionsElements) {
                        const optVal = li.dataset.value.toLowerCase();
                        if (url.endsWith(optVal) || optVal === filename) {
                            selectOption(li.dataset.value, li.textContent, false);
                            break;
                        }
                    }
                };
            };

            const models = await window.WebAvatar.getModels();
            console.log("models", models);
            const anims = await window.WebAvatar.getAnimations();
            console.log("anims", anims);

            setupCustomSelect('modelSelectContainer', 'modelSelectBtn', 'modelSelectOpts', models, 'Kitagawa', (val) => {
                if (window.WebAvatar) window.WebAvatar.loadModel(val);
            });
            
            setupCustomSelect('animSelectContainer', 'animSelectBtn', 'animSelectOpts', anims, 'Idleloop', (val) => {
                if (window.WebAvatar) window.WebAvatar.loadAnimation(val);
            });


            // Handle URL loading
            const urlInput = document.getElementById('urlInput');
            const loadBtn = document.getElementById('loadBtn');
            const siteFrame = document.getElementById('siteFrame');

            const loadSite = () => {
                let url = urlInput.value.trim();
                const emptyState = document.getElementById('emptyState');
                if (url) {
                    if (!url.startsWith('http://') && !url.startsWith('https://')) {
                        url = 'https://' + url;
                        urlInput.value = url;
                    }
                    siteFrame.src = url;
                    siteFrame.style.display = 'block';
                    if (emptyState) emptyState.style.display = 'none';
                } else {
                    siteFrame.src = 'about:blank';
                    siteFrame.style.display = 'none';
                    if (emptyState) emptyState.style.display = 'flex';
                }
            };

            loadBtn.addEventListener('click', loadSite);
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loadSite();
                }
            });
            // loadBtn.click();

            

            // Audio Controls
            const audioInput = document.getElementById('audioInput');
            const playAudioBtn = document.getElementById('playAudioBtn');
            const stopAudioBtn = document.getElementById('stopAudioBtn');
            const volumeSlider = document.getElementById('volumeSlider');

            playAudioBtn.addEventListener('click', () => {
                const source = audioInput.value.trim();
                if (source) {
                    window.WebAvatar.playAudio(source);
                } else {
                    alert('Please enter an Audio URL or Base64 string');
                }
            });

            stopAudioBtn.addEventListener('click', () => {
                if (window.WebAvatar) window.WebAvatar.stopAudio();
            });

            const updateCamera = () => {
                if (window.WebAvatar) window.WebAvatar.setCameraPosition(cameraTarget.x, cameraTarget.y, cameraTarget.z);
            };

            const camStep = 0.1;
            document.getElementById('camUpBtn').addEventListener('click', () => { cameraTarget.y += camStep; updateCamera(); });
            document.getElementById('camDownBtn').addEventListener('click', () => { cameraTarget.y -= camStep; updateCamera(); });
            document.getElementById('camLeftBtn').addEventListener('click', () => { cameraTarget.x -= camStep; updateCamera(); });
            document.getElementById('camRightBtn').addEventListener('click', () => { cameraTarget.x += camStep; updateCamera(); });
            
            document.getElementById('camZUpBtn').addEventListener('click', () => { cameraTarget.z -= camStep * 5; updateCamera(); });
            document.getElementById('camZDownBtn').addEventListener('click', () => { cameraTarget.z += camStep * 5; updateCamera(); });

            volumeSlider.addEventListener('input', (e) => {
                if (window.WebAvatar) window.WebAvatar.setVolume(parseFloat(e.target.value));
            });

            // Emotion Controls
            const playEmotionBtn = document.getElementById('playEmotionBtn');
            const emotionSelect = document.getElementById('emotionSelect');
            const emotionDuration = document.getElementById('emotionDuration');

            playEmotionBtn.addEventListener('click', () => {
                if (window.WebAvatar) {
                    const duration = parseFloat(emotionDuration.value) || 0;
                    window.WebAvatar.setEmotion(emotionSelect.value, duration);
                }
            });

            // VRM Drag & Drop
            const dropOverlay = document.getElementById('dropOverlay');
            let dragCounter = 0;

            window.addEventListener('dragenter', (e) => {
                e.preventDefault();
                dragCounter++;
                dropOverlay.style.display = 'flex';
            });

            window.addEventListener('dragover', (e) => {
                e.preventDefault();
            });

            window.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dragCounter--;
                if (dragCounter <= 0) {
                    dragCounter = 0;
                    dropOverlay.style.display = 'none';
                }
            });

            window.addEventListener('drop', (e) => {
                e.preventDefault();
                dragCounter = 0;
                dropOverlay.style.display = 'none';

                const file = e.dataTransfer.files[0];
                if (!file) return;

                const fileName = file.name.toLowerCase();
                if (!fileName.endsWith('.vrm') && !fileName.endsWith('.vrma')) {
                    alert('Please drop a .vrm or .vrma file');
                    return;
                }

                const blobUrl = URL.createObjectURL(file);
                if (fileName.endsWith('.vrma')) {
                    console.log(`Loading dropped VRMA: ${file.name}`);
                    window.WebAvatar.loadAnimation(blobUrl);
                } else {
                    console.log(`Loading dropped VRM: ${file.name}`);
                    window.WebAvatar.loadModel(blobUrl);
                }
            });

            // Toolbar Collapse Logic
            const toolbar = document.getElementById('toolbar');
            const notch = document.getElementById('toolbar-notch');
            let isToolbarCollapsed = false;

            const updateToolbarState = () => {
                if (isToolbarCollapsed) {
                    const height = toolbar.offsetHeight;
                    toolbar.style.marginTop = `-${height}px`;
                    notch.textContent = '▼';
                } else {
                    toolbar.style.marginTop = '0px';
                    notch.textContent = '▲';
                }
            };

            notch.addEventListener('click', () => {
                isToolbarCollapsed = !isToolbarCollapsed;
                if (isToolbarCollapsed) {
                    toolbar.classList.add('collapsed');
                } else {
                    toolbar.classList.remove('collapsed');
                }
                updateToolbarState();
            });

            window.addEventListener('resize', () => {
                if (isToolbarCollapsed) {
                    updateToolbarState();
                }
            });
        };

        // Wait for DOM to be ready then init
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initWidget);
        } else {
            initWidget();
        }
    </script>
</body>

</html>
